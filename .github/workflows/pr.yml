# =============================================================================
# pr.yml — Tuji iOS  (PR 檢查)
# 觸發：PR 開啟 / 更新時
# 跑：SwiftLint + SwiftFormat lint + Build + Unit Test
# 目標：< 8 分鐘
# =============================================================================

name: PR

on:
  pull_request:
    branches: [main, develop]

concurrency:
  # 同個 PR 連推會取消前一次
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
          key: brew-${{ runner.os }}-swiftlint-swiftformat

      - name: Install SwiftLint & SwiftFormat
        run: |
          brew install swiftlint swiftformat

      - name: SwiftFormat (lint mode)
        run: swiftformat . --lint

      - name: SwiftLint
        # Not --strict yet: W2 has many hard-coded Chinese strings the
        # no_hardcoded_chinese rule warns about. Errors still fail CI.
        run: swiftlint --reporter github-actions-logging

  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Setup Xcode (latest stable)
        # Nuke 13.0.6 uses `isolated deinit` (Swift 6.1+) so anything older
        # than Xcode 16.5 / 26 fails to build it. latest-stable resolves to
        # whatever the runner image has shipping — currently Xcode 26 on
        # macos-15.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Create stub Secrets.xcconfig
        # PR job 不簽章，用空 Secrets 讓 build 跑得起來
        run: |
          cat > Config/Secrets.xcconfig <<EOF
          TUJI_DEV_TEAM = STUBSTUBST
          TUJI_SUPABASE_PROJECT_DEV = stub-dev
          TUJI_SUPABASE_PROJECT_PROD = stub-prod
          TUJI_SUPABASE_ANON_KEY_DEV = stub
          TUJI_SUPABASE_ANON_KEY_PROD = stub
          TUJI_GOOGLE_CLIENT_ID = stub
          TUJI_GOOGLE_REVERSED_CLIENT_ID = com.googleusercontent.apps.stub
          TUJI_SENTRY_DSN = https:/\$()/stub@stub.ingest.sentry.io/0
          EOF

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Tuji.xcodeproj \
            -scheme Tuji-Debug

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Tuji.xcodeproj \
            -scheme Tuji-Debug \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      # No test target yet — W2 didn't add one. When TujiTests lands,
      # uncomment this block + remove the `Targets: Tuji` comment in the
      # PR description checklist.
      # - name: Unit Tests
      #   run: |
      #     set -o pipefail
      #     xcodebuild test \
      #       -project Tuji.xcodeproj \
      #       -scheme Tuji-Debug \
      #       -configuration Debug \
      #       -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
      #       -derivedDataPath build \
      #       -enableCodeCoverage YES \
      #       CODE_SIGNING_ALLOWED=NO \
      #       | xcbeautify --renderer github-actions

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: test-results
      #     path: build/Logs/Test/*.xcresult

  api-contract:
    name: API contract check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7

      - name: Check ARCHITECTURE links
        # 提醒：若 PR 改了 Endpoint enum / Models.swift，描述要連結 backend PR
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E "Core/Networking/Endpoints\.swift|Models/.*\.swift" >/dev/null; then
            if ! echo "${{ github.event.pull_request.body }}" \
              | grep -E "(tuji#[0-9]+|Backend PR:)" >/dev/null; then
              echo "::warning::Endpoint/Models 有改但 PR 沒連 backend PR — 確認後端是否已配套部署？"
            fi
          fi
