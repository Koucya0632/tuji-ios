# =============================================================================
# pr.yml — Tuji iOS  (PR 檢查)
# 觸發：PR 開啟 / 更新時
# 跑：SwiftLint + SwiftFormat lint + Build + Unit Test
# 目標：< 8 分鐘
# =============================================================================

name: PR

on:
  pull_request:
    branches: [main, develop]

concurrency:
  # 同個 PR 連推會取消前一次
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 5
    env:
      # 釘版：brew install 抓 latest，工具一升版規則就變、CI 就無預警轉紅
      # （0.61 的 indent/docComments 曾讓 main 紅了一段時間）。要升版時
      # 改這裡 + 本地跑一次 `swiftformat Tuji TujiTests` 同一個 PR 進。
      SWIFTFORMAT_VERSION: 0.61.1
      SWIFTLINT_VERSION: 0.64.0
    steps:
      - uses: actions/checkout@v7

      - name: Install SwiftLint & SwiftFormat (pinned)
        run: |
          mkdir -p "$HOME/.lint-tools"
          curl -fsSL -o /tmp/swiftformat.zip \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -o -q /tmp/swiftformat.zip -d /tmp/swiftformat-dist
          install -m 755 "$(find /tmp/swiftformat-dist -name swiftformat -type f | head -1)" "$HOME/.lint-tools/"
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -o -q /tmp/swiftlint.zip -d /tmp/swiftlint-dist
          install -m 755 "$(find /tmp/swiftlint-dist -name swiftlint -type f | head -1)" "$HOME/.lint-tools/"
          echo "$HOME/.lint-tools" >> "$GITHUB_PATH"
          "$HOME/.lint-tools/swiftformat" --version
          "$HOME/.lint-tools/swiftlint" version

      - name: SwiftFormat (lint mode)
        run: swiftformat . --lint

      - name: SwiftLint
        # Not --strict yet: W2 has many hard-coded Chinese strings the
        # no_hardcoded_chinese rule warns about. Errors still fail CI.
        run: swiftlint --reporter github-actions-logging

  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 20
    # 刻意不設 needs: lint — 之前 Lint 紅了整條測試就被跳過，
    # style 問題不該擋正確性檢查。
    steps:
      - uses: actions/checkout@v7

      - name: Setup Xcode (latest stable)
        # Nuke 13.0.6 uses `isolated deinit` (Swift 6.1+) so anything older
        # than Xcode 16.5 / 26 fails to build it. latest-stable resolves to
        # whatever the runner image has shipping — currently Xcode 26 on
        # macos-15.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Create stub Secrets.xcconfig
        # PR job 不簽章，用空 Secrets 讓 build 跑得起來
        run: |
          cat > Config/Secrets.xcconfig <<EOF
          TUJI_DEV_TEAM = STUBSTUBST
          TUJI_SUPABASE_PROJECT_DEV = stub-dev
          TUJI_SUPABASE_PROJECT_PROD = stub-prod
          TUJI_SUPABASE_ANON_KEY_DEV = stub
          TUJI_SUPABASE_ANON_KEY_PROD = stub
          TUJI_GOOGLE_CLIENT_ID = stub
          TUJI_GOOGLE_REVERSED_CLIENT_ID = com.googleusercontent.apps.stub
          EOF

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Tuji.xcodeproj \
            -scheme Tuji-Debug

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Tuji.xcodeproj \
            -scheme Tuji-Debug \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Select simulator
        # runner image 的機型/OS 會隨 Xcode 版本變，寫死機名容易斷 —
        # 挑最新 iOS runtime 裡第一台可用 iPhone。
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          def rt_key(rt):
              tail = rt.rsplit("iOS-", 1)
              return [int(x) for x in tail[1].split("-")] if len(tail) == 2 else [-1]
          for rt in sorted((r for r in data if "iOS" in r), key=rt_key, reverse=True):
              iphones = [d for d in data[rt] if d["name"].startswith("iPhone")]
              if iphones:
                  print(iphones[0]["udid"]); break
          ')
          [ -n "$UDID" ] || { echo "::error::找不到可用的 iPhone simulator"; exit 1; }
          xcrun simctl list devices available | grep "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Tuji.xcodeproj \
            -scheme Tuji-Debug \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: build/Logs/Test/*.xcresult

  api-contract:
    name: API contract check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7

      - name: Check ARCHITECTURE links
        # 提醒：若 PR 改了 Endpoint enum / Models.swift，描述要連結 backend PR
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E "Core/Networking/Endpoints\.swift|Models/.*\.swift" >/dev/null; then
            if ! echo "${{ github.event.pull_request.body }}" \
              | grep -E "(tuji#[0-9]+|Backend PR:)" >/dev/null; then
              echo "::warning::Endpoint/Models 有改但 PR 沒連 backend PR — 確認後端是否已配套部署？"
            fi
          fi
