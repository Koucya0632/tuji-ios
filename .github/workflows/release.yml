# =============================================================================
# release.yml — Tuji iOS  (archive + 上 TestFlight)
# 觸發：push tag v* （v1.0.0-beta.1 / v1.0.0-rc.1 / v1.0.0 ...）
# 跑：archive → 簽章 → 上傳 App Store Connect
# 目標：< 25 分鐘
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

# 同時只跑一個 release，避免 build number 衝突
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  testflight:
    name: TestFlight
    runs-on: macos-15
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # tag 描述 / version 需要全 history

      - name: Setup Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve scheme & version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF##*/}"           # 例：v1.0.0-beta.3
          VERSION="${TAG#v}"                # 1.0.0-beta.3
          MARKETING="${VERSION%%-*}"        # 1.0.0
          PRE="${VERSION#$MARKETING}"       # -beta.3 / -rc.1 / 空

          if [[ -n "$PRE" ]]; then
            SCHEME="Tuji-TestFlight"
            CONFIG="TestFlight"
            CHANNEL="testflight"
          else
            SCHEME="Tuji-Release"
            CONFIG="Release"
            CHANNEL="appstore"
          fi

          BUILD_NUMBER=$GITHUB_RUN_NUMBER

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "marketing=$MARKETING" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

          echo "::notice::Archiving $TAG ($MARKETING #$BUILD_NUMBER) → $CHANNEL"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}

      - name: Restore Secrets.xcconfig from GitHub Secrets
        run: |
          # SECRETS_XCCONFIG_B64 是 base64 過的整個 Secrets.xcconfig 內容
          # 一次性：base64 -i Config/Secrets.xcconfig | pbcopy → GitHub Secrets
          echo "${{ secrets.SECRETS_XCCONFIG_B64 }}" | base64 -d > Config/Secrets.xcconfig

      - name: Bump build number
        run: |
          /usr/libexec/PlistBuddy -c "Set CURRENT_PROJECT_VERSION ${{ steps.meta.outputs.build }}" \
            Config/Version.xcconfig 2>/dev/null || \
          sed -i '' "s/^CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${{ steps.meta.outputs.build }}/" \
            Config/Version.xcconfig

          sed -i '' "s/^MARKETING_VERSION = .*/MARKETING_VERSION = ${{ steps.meta.outputs.marketing }}/" \
            Config/Version.xcconfig

          cat Config/Version.xcconfig

      - name: Install fastlane match (簽章)
        run: |
          gem install fastlane --no-document

      - name: Sync signing via match
        run: |
          # match 從 git repo（另一個私有 repo）拉憑證 + provisioning profile
          fastlane match appstore --readonly --git_url "${{ secrets.MATCH_GIT_URL }}"

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Tuji.xcodeproj \
            -scheme "${{ steps.meta.outputs.scheme }}"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Tuji.xcodeproj \
            -scheme "${{ steps.meta.outputs.scheme }}" \
            -configuration "${{ steps.meta.outputs.config }}" \
            -destination 'generic/platform=iOS' \
            -archivePath build/Tuji.xcarchive \
            -allowProvisioningUpdates \
            | xcbeautify --renderer github-actions

      - name: Export IPA
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${{ secrets.TUJI_DEV_TEAM }}</string>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Tuji.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect (TestFlight)
        run: |
          # 用 App Store Connect API key（.p8）— 不再用 app-specific password
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" | base64 -d \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/export/Tuji.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload dSYM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dSYM-${{ steps.meta.outputs.tag }}
          path: build/Tuji.xcarchive/dSYMs

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ steps.meta.outputs.tag }}
          path: build/export/Tuji.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.channel == 'testflight' }}
          generate_release_notes: true
          files: |
            build/export/Tuji.ipa

      - name: Notify on failure
        if: failure()
        # 失敗時推 Slack / Discord（可選）
        run: echo "::warning::Release ${{ steps.meta.outputs.tag }} 失敗，看 logs"
