# =============================================================================
# release.yml — Tuji iOS  (archive + 上 TestFlight)
# 觸發：push tag v* （v1.0.0-beta.1 / v1.0.0-rc.1 / v1.0.0 ...）
# 跑：fastlane match 簽章 → build_app → upload_to_testflight
# 目標：< 25 分鐘
#
# 簽章走 fastlane match（憑證 / profile 加密存在另一個私有 git repo）。
# 第一次要在本機跑 `bundle exec fastlane bootstrap_certificates` 產出憑證，
# CI 只 readonly 拉。完整步驟見 RELEASE.md。
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

# 同時只跑一個 release，避免 build number 衝突
concurrency:
  group: release
  cancel-in-progress: false

# GITHUB_TOKEN 需要 contents:write 才能建 GitHub Release + 讀 release notes
permissions:
  contents: write

jobs:
  testflight:
    name: TestFlight
    runs-on: macos-15
    timeout-minutes: 30

    env:
      # App Store Connect API key（.p8 base64）— match 取 portal + pilot 上傳用
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      # fastlane match
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Apple Developer Team ID（Appfile / 簽章用）
      TUJI_DEV_TEAM: ${{ secrets.TUJI_DEV_TEAM }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0      # tag 描述 / version 需要全 history

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true   # 依 Gemfile.lock 快取 gems

      - name: Resolve scheme & version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF##*/}"           # 例：v1.0.0-beta.3
          VERSION="${TAG#v}"                # 1.0.0-beta.3
          MARKETING="${VERSION%%-*}"        # 1.0.0
          PRE="${VERSION#"$MARKETING"}"     # -beta.3 / -rc.1 / 空

          if [[ -n "$PRE" ]]; then
            SCHEME="Tuji-TestFlight"
            CONFIG="TestFlight"
            APP_ID="app.tuji.ios"
            CHANNEL="testflight"
          else
            SCHEME="Tuji-Release"
            CONFIG="Release"
            APP_ID="app.tuji.ios"
            CHANNEL="appstore"
          fi

          {
            echo "tag=$TAG"
            echo "marketing=$MARKETING"
            echo "build=$GITHUB_RUN_NUMBER"
            echo "scheme=$SCHEME"
            echo "config=$CONFIG"
            echo "app_id=$APP_ID"
            echo "channel=$CHANNEL"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Archiving $TAG ($MARKETING #$GITHUB_RUN_NUMBER) → $CHANNEL"

      - name: Restore Secrets.xcconfig from GitHub Secrets
        run: |
          # SECRETS_XCCONFIG_B64 是 base64 過的整個 Secrets.xcconfig 內容
          # 一次性：base64 -i Config/Secrets.xcconfig | pbcopy → GitHub Secrets
          echo "${{ secrets.SECRETS_XCCONFIG_B64 }}" | base64 -d > Config/Secrets.xcconfig

      - name: Bump version + build number
        run: |
          sed -i '' "s/^CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${{ steps.meta.outputs.build }}/" \
            Config/Version.xcconfig
          sed -i '' "s/^MARKETING_VERSION = .*/MARKETING_VERSION = ${{ steps.meta.outputs.marketing }}/" \
            Config/Version.xcconfig
          cat Config/Version.xcconfig

      - name: Build + upload to TestFlight
        run: |
          bundle exec fastlane beta \
            scheme:"${{ steps.meta.outputs.scheme }}" \
            configuration:"${{ steps.meta.outputs.config }}" \
            app_identifier:"${{ steps.meta.outputs.app_id }}"

      - name: Upload dSYM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dSYM-${{ steps.meta.outputs.tag }}
          path: build/*.dSYM.zip
          if-no-files-found: ignore

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ipa-${{ steps.meta.outputs.tag }}
          path: build/Tuji.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        continue-on-error: true   # TestFlight 上傳才是目的；Release 失敗不該蓋掉成功
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.channel == 'testflight' }}
          generate_release_notes: true
          files: |
            build/Tuji.ipa

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Release ${{ steps.meta.outputs.tag }} 失敗，看 logs"
